<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>라이브 메모</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
    /* #region font-face */
        @font-face {
        font-family: 'Pretendard';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2');
        font-weight: 100;
        font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }
    /* #endregion */
        
    * {
       
        font-family: 'Pretendard';
        font-weight: 600;
        color: #333;
        text-decoration: none;
        list-style-type: none;
        
    }    
   
    body { 
        background: #f0f2f5; 
        display: flex; 
        justify-content: center; 
        padding-top: 50px; 
    }
    
    .memo-card {
        max-width: 500px; 
        background: #fff; 
        padding: 25px; 
        border-radius: 15px; 
        position: relative; 
    }
    #live-clock { 
        position: absolute; 
        top: 20px; 
        right: 25px; 
        display: flex;
        /* 숫자폰트에 monospace주는법 */
        font-variant-numeric: tabular-nums;
    }

    #live-clock > span {
        padding: 0 5px;
    }

    #clock-digit {
        font-weight: 700; 
        color: #78B1F1; 
    }
    h2 { 
        font-size: 1.2rem; 
        margin-bottom: 20px; 
    }
    
    .setup-box { 
        background: #f8fafc; 
        border: 1px solid #e2e8f0; 
        padding: 15px; 
        border-radius: 10px; 
        margin-bottom: 20px; 
    }
    .input-group { 
        font-size: 0.9rem; 
    }
    .input-group label { 
        display: block; 
        margin-bottom: 8px; 
        font-weight: 600; 
    }
    
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    input[type="number"] { 
        border: 1px solid #78B1F1; 
        padding: 5px; 
        border-radius: 5px; 
        width: 40px; 
        text-align: center; 
    }
    input[type="text"] { 
        width: 100%; 
        padding: 12px; 
        border: 2px solid #e2e8f0; 
        border-radius: 8px; 
        box-sizing: border-box; 

    }
    input[type="text"]:focus { 
        border-color: #78B1F1; 
        outline: none; }
    
    button { 
        background: #000000; 
        color: white; 
        border: none; 
        padding: 6px 12px; 
        border-radius: 5px; 
        cursor: pointer; 
        font-weight: 600; 
        margin-left: 5px; 
    }
   

    #base-info { 
        margin-top: 10px; 
    }
    #memo-list { 
        list-style: none; 
        padding: 0; 
        margin-top: 20px; 
        border-top: 1px solid #f1f5f9; 
    }
    #memo-list li { 
        padding: 10px 0; 
        border-bottom: 1px solid #f1f5f9; 
        font-size: 0.95rem; 
    }
    .time-tag { 
        color: #78B1F1; 
        font-weight: bold; 
        margin-right: 10px; 
        font-variant-numeric: tabular-nums;
    }

    /* 토스트 메시지 스타일 */
    #toast {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 0.85rem;
        font-weight: 400;
        z-index: 1000;
        display: none;
    }
    </style>
</head>
<body>
    
<div class="memo-card">
    <div id="live-clock">
        <span>현재 시각</span>
        <span id="clock-digit">00:00:00</span>
    </div>
    <h2>생방송 모니터링 메모장</h2>

    <div class="setup-box">
        <div class="input-group">
            <label>방송 시작 시점 설정 (현재로부터)</label>
            <input type="number" id="off-h" placeholder="0"> 시
            <input type="number" id="off-m" placeholder="0"> 분
            <input type="number" id="off-s" placeholder="0"> 초 전
            <button id="btn-offset">설정</button>
        </div>
        <div id="base-info">방송 시작 시각: <span id="current-base" style="font-weight:bold;">미설정</span></div>
    </div>

    <input type="text" id="memo-field" placeholder="시작 시각을 설정해주세요" disabled>

    <ul id="memo-list"></ul>
</div>
<div id="toast"></div>

<script>
    let baseDate = null;

    // 실시간 시계
    function tick() {
        $('#clock-digit').text(new Date().toLocaleTimeString('ko-KR', { hour12: true }));
    }
    setInterval(tick, 1000);
    tick();

    function showToast(message) {
    const $toast = $('#toast');
    $toast.text(message).fadeIn(300); // 0.3초 동안 서서히 나타남

    // 1.5초 후에 다시 사라짐
    setTimeout(function() {
        $toast.fadeOut(300);
    }, 1500);
    }


    // 시작 시각 계산 및 적용
    $('#off-m, #off-s').on('change keyup', function() {
        const val = parseInt($(this).val()) || 0;
        const isMin = $(this).attr('id') === 'off-m' ? '분' : '초';

        if (val > 59) {
            showToast(`${isMin}은 59까지 입력 가능합니다.`);
            $(this).val(59);
        } else if (val < 0) {
            showToast('음수는 입력할 수 없습니다.');
            $(this).val(0);
        }
    });
    
    $('#off-h').on('change keyup', function() {
        if (parseInt($(this).val()) < 0) {
            showToast('음수는 입력할 수 없습니다.');
            $(this).val(0);
        }
    });

    $('#btn-offset').on('click', function() {
        const h = parseInt($('#off-h').val()) || 0;
        const m = parseInt($('#off-m').val()) || 0;
        const s = parseInt($('#off-s').val()) || 0;


        const totalMs = ((h * 3600) + (m * 60) + s) * 1000;
        baseDate = new Date(Date.now() - totalMs);
        
        const display = baseDate.toLocaleTimeString('ko-KR', { hour12: false });
        $('#current-base').text(display).css('color', '#78B1F1');
        $('#memo-field').prop('disabled', false).attr('placeholder', '메모 입력 후 엔터...').focus();
    });

    // 메모 기록
    $('#memo-field').on('keypress', function(e) {
        if (e.which === 13 && $(this).val().trim() !== "") {
            const now = new Date();
            const diffSec = Math.floor((now - baseDate) / 1000);

            // 타임스탬프 계산 (HH:mm:ss)
            const h = String(Math.floor(diffSec / 3600)).padStart(2, '0');
            const m = String(Math.floor((diffSec % 3600) / 60)).padStart(2, '0');
            const s = String(diffSec % 60).padStart(2, '0');
            const timestamp = `${h}:${m}:${s}`;

            $('#memo-list').prepend(`
                <li><span class="time-tag">[${timestamp}]</span>${$(this).val()}</li>
            `);

            $(this).val("");
        }
    });
</script>

</body>
</html>
